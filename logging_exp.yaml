version: 1
disable_existing_loggers: False
formatters:
  default:
    format: "%(asctime)s [exp/no-template-align] %(levelname)s %(name)s: %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout
loggers:
  uvicorn:
    handlers: [console]
    level: INFO
    propagate: False
  uvicorn.error:
    handlers: [console]
    level: INFO
    propagate: False
  uvicorn.access:
    handlers: [console]
    level: INFO
    propagate: False
root:
  handlers: [console]
  level: INFO
